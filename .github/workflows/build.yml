name: Build kernel + XDP stack (minimal)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - 'custom/**'

env:
  OPENWRT_VERSION: v25.12.2

jobs:
  build:
    name: Kernel + XDP only (方案 C)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout workspace
      uses: actions/checkout@v4
      with:
        path: workspace

    # OpenWrt build 要 ~15GB 磁盘，runner 默认只剩 14GB 可用；先腾出 ~40GB
    - name: Free up disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install build deps
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses-dev libssl-dev python3-setuptools \
          rsync swig unzip zlib1g-dev file wget xsltproc

    - name: Clone OpenWrt ${{ env.OPENWRT_VERSION }}
      run: |
        git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} \
          https://github.com/openwrt/openwrt.git openwrt

    - name: Enable XDP_SOCKETS + DPDK/VPP 依赖内核选项
      run: |
        cd openwrt
        # ---- XDP / AF_XDP ----
        sed -i 's|^# CONFIG_XDP_SOCKETS is not set$|CONFIG_XDP_SOCKETS=y\nCONFIG_XDP_SOCKETS_DIAG=y|' \
          target/linux/generic/config-6.12
        # ---- DPDK 前置：大页 + IOMMU + PCI MSI（UIO/VFIO 走 kmod 包，避免 Kconfig 子选项 NEW 提示挂死）----
        sed -i \
            -e 's|^# CONFIG_HUGETLBFS is not set$|CONFIG_HUGETLBFS=y|' \
            -e 's|^# CONFIG_HUGETLB_PAGE is not set$|CONFIG_HUGETLB_PAGE=y|' \
            -e 's|^# CONFIG_TRANSPARENT_HUGEPAGE is not set$|CONFIG_TRANSPARENT_HUGEPAGE=y\n# CONFIG_TRANSPARENT_HUGEPAGE_ALWAYS is not set\nCONFIG_TRANSPARENT_HUGEPAGE_MADVISE=y\n# CONFIG_TRANSPARENT_HUGEPAGE_NEVER is not set\n# CONFIG_READ_ONLY_THP_FOR_FS is not set|' \
            -e 's|^# CONFIG_PCI_MSI is not set$|CONFIG_PCI_MSI=y\nCONFIG_PCI_MSI_IRQ_DOMAIN=y|' \
            target/linux/generic/config-6.12
        # IOMMU_SUPPORT 通过 x86/64 里 INTEL_IOMMU=y / AMD_IOMMU=y 隐式 select，不用直接设
        # UIO / VFIO 走下面的 CONFIG_PACKAGE_kmod-uio / kmod-vfio（OpenWrt 用 kmod 包机制绕开 Kconfig NEW 子选项问题）
        echo "===改动确认==="
        grep -E 'CONFIG_(UIO|VFIO|HUGETLB|IOMMU_SUPPORT|TRANSPARENT_HUGE|PCI_MSI|XDP_SOCKETS)(_|$|=)' target/linux/generic/config-6.12 | head -30

    - name: Inject xdp-nat package
      run: |
        mkdir -p openwrt/package/custom
        cp -r workspace/custom/xdp-nat openwrt/package/custom/xdp-nat

    - name: Update & install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure (minimal — 只选需要的)
      run: |
        cd openwrt
        # 先下 release 的 config 作为基线（保证 kernel ABI 兼容当前路由器）
        wget -q https://downloads.openwrt.org/releases/25.12.2/targets/x86/64/config.buildinfo -O .config
        # 追加我们的 kernel 选项 + XDP 包
        cat >> .config <<EOF

        # === kernel 侧 ===
        CONFIG_KERNEL_XDP_SOCKETS=y
        CONFIG_KERNEL_XDP_SOCKETS_DIAG=y

        # === 用户态 XDP 包 ===
        CONFIG_PACKAGE_libxdp=y
        CONFIG_PACKAGE_libbpf=y
        CONFIG_PACKAGE_xdp-loader=y
        CONFIG_PACKAGE_xdp-filter=y
        CONFIG_PACKAGE_xdpdump=y
        CONFIG_PACKAGE_bpftool=y
        CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
        CONFIG_PACKAGE_xdp-nat=y

        # ===== DPDK / VPP 支持 =====
        # kmod（即便内核 builtin 也试装，避免 config 系统漏勾）
        CONFIG_PACKAGE_kmod-uio-pci-generic=y
        CONFIG_PACKAGE_kmod-vfio=y
        CONFIG_PACKAGE_kmod-vfio-pci=y
        # DPDK 用户态工具（若 feed 有）
        CONFIG_PACKAGE_dpdk=y
        CONFIG_PACKAGE_dpdk-tools=y
        # VPP（fd.io 包；若 feeds 没提供会被 defconfig 丢弃）
        CONFIG_PACKAGE_vpp=y
        # 大页 + IOMMU 工具
        CONFIG_PACKAGE_hugetlbfs=y
        CONFIG_PACKAGE_pciutils=y
        CONFIG_PACKAGE_libnuma=y
        EOF
        make defconfig
        echo "--- XDP 相关项确认 ---"
        grep -E 'XDP|bpftool' .config | grep -v '^#' | head -20

    - name: Download sources only (parallel)
      run: cd openwrt && make download -j8

    # 关键优化：tools + toolchain 必须编完（kernel / 包都依赖它）
    # 但之后只编 kernel + 我们需要的几个 package，不走 `make world`
    - name: Compile tools
      run: cd openwrt && FORCE_UNSAFE_CONFIGURE=1 make tools/install -j$(nproc)

    - name: Compile toolchain (gcc × 2 bootstrap，最耗时的一步)
      run: cd openwrt && FORCE_UNSAFE_CONFIGURE=1 make toolchain/install -j$(nproc)

    - name: Compile kernel + modules
      run: cd openwrt && FORCE_UNSAFE_CONFIGURE=1 make target/linux/compile -j$(nproc) V=s 2>&1 | tail -100

    - name: Compile XDP user-space stack
      run: |
        cd openwrt
        FORCE_UNSAFE_CONFIGURE=1 make \
          package/feeds/base/libbpf/compile \
          package/feeds/base/xdp-tools/compile \
          package/feeds/base/bpftool/compile \
          -j$(nproc) V=s 2>&1 | tail -50

    - name: Compile xdp-nat custom package
      run: |
        cd openwrt
        FORCE_UNSAFE_CONFIGURE=1 make package/custom/xdp-nat/compile -j$(nproc) V=sc

    - name: Collect artifacts
      run: |
        cd openwrt
        mkdir -p /tmp/release

        # 1. 内核（bzImage）—— 替换路由器的 /boot/vmlinuz
        find build_dir/target-*/linux-*/linux-6.12.*/arch/x86/boot/bzImage \
          -exec cp {} /tmp/release/vmlinuz \; 2>/dev/null || true

        # 2. 完整模块树（打成 tar.gz，便于整盘替换）
        KDIR=$(find build_dir/target-*/linux-*/linux-6.12.* -maxdepth 0 -type d | head -1)
        if [ -d "$KDIR/modules" ]; then
          tar -czf /tmp/release/modules.tar.gz -C "$KDIR/modules" lib/
        else
          # 备用：从 staging_dir 里捞
          tar -czf /tmp/release/modules.tar.gz \
            -C staging_dir/target-*/root-x86/lib modules 2>/dev/null || true
        fi

        # 3. 我们的 xdp-fw 包（替代老 xdp-nat）
        find bin/packages -name 'xdp-fw*.apk'       -exec cp {} /tmp/release/ \;
        find bin/packages -name 'xdp-nat*.apk'      -exec cp {} /tmp/release/ \; 2>/dev/null || true

        # 4. XDP / AF_XDP 用户态工具
        find bin/packages -name 'libxdp*.apk'       -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'libbpf*.apk'       -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'xdp-loader*.apk'   -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'xdp-filter*.apk'   -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'bpftool*.apk'      -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'kmod-xdp-sockets*.apk' -exec cp {} /tmp/release/ \; 2>/dev/null || true

        # 5. DPDK / VPP 相关 apk
        find bin/packages -name 'dpdk*.apk'         -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'vpp*.apk'          -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'kmod-uio*.apk'     -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'kmod-vfio*.apk'    -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'libnuma*.apk'      -exec cp {} /tmp/release/ \; 2>/dev/null || true
        find bin/packages -name 'pciutils*.apk'     -exec cp {} /tmp/release/ \; 2>/dev/null || true

        # 6. 内核 config 快照（验证 XDP_SOCKETS / VFIO / HUGETLBFS 都在）
        KCFG=$(find build_dir/target-*/linux-*/linux-6.12.*/.config | head -1)
        cp "$KCFG" /tmp/release/kernel.config 2>/dev/null || true

        echo "=== /tmp/release 内容 ==="
        ls -lh /tmp/release/
        echo "=== 总大小 ==="
        du -sh /tmp/release/
        echo "=== Kernel 关键配置确认 ==="
        grep -E 'CONFIG_(XDP_SOCKETS|VFIO|UIO|HUGETLB|IOMMU_SUPPORT|TRANSPARENT_HUGE)' /tmp/release/kernel.config 2>/dev/null | head -20

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-dpdk-vpp-xdp-${{ github.run_number }}
        path: /tmp/release/
        retention-days: 14
        if-no-files-found: error
